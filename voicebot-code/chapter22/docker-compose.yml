
version: "3.9"

services:
  voicebot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: voicebot:latest
    container_name: voicebot-app
    restart: unless-stopped

    environment:
      # API Key 通过环境变量传入，不写进镜像
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TTS_ENDPOINT=${TTS_ENDPOINT:-cosyvoice:50051}

    volumes:
      # 挂载模型目录（本地模型）
      - ./models:/app/models:ro
      # 挂载配置（方便修改后不用重建镜像）
      - ./config.json:/app/config.json:ro
      # 日志目录
      - ./logs:/app/logs

    ports:
      # 只暴露给 Nginx，不直接对外
      - "127.0.0.1:8080:8080"

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

    # 资源限制（根据实际情况调整）
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G

  # 如果使用本地 CosyVoice TTS 服务
  cosyvoice:
    image: cosyvoice:latest
    container_name: voicebot-tts
    restart: unless-stopped

    volumes:
      - ./models/CosyVoice2-0.5B:/app/models/CosyVoice2-0.5B:ro

    ports:
      # 只在容器网络内暴露
      - "127.0.0.1:50051:50051"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  default:
    name: voicebot-network
